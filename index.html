<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles/variables.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/font.css">
    <link rel="stylesheet" href="style.css">
    <script src="./assets/scripts/script.js" defer></script>
</head>
<body onload="renderGallery()">
    <header class="main-header">
        <div class="div-wrapper">
            <img src="./assets/icons/logo.svg" alt="Fotogram-Logo">
        </div>
    </header>

    <main>
        <div class="div-wrapper page-content">
            <h1>Your personal photo album</h1>
            <section id="gallery"></section>
        </div>
    </main>

    <dialog id="photo-overlay">
        <div class="dialog-content">
            <header>
                <h2 id="photo-title"></h2>
                <input type="image" src="./assets/icons/close.svg" onclick="closeDialog()">
            </header>
            <section id="photo"></section>
            <footer>
                <input type="image" src="./assets/icons/arrow-left.svg" onclick="showPrevImage()">
                <p id="photo-number"></p>
                <input type="image" src="./assets/icons/arrow-right.svg" onclick="showNextImage()">
            </footer>
        </div>
    </dialog>

    <footer class="main-footer">
        <figure class="div-wrapper">
            <img src="./assets/icons/da-logo.svg" alt="Developer Akademie Logo">
            <figcaption>© 2023 Developer Akademie GmbH</figcaption>
        </figure>
    </footer>
</body>
</html>
