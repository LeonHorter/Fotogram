<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles/variables.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/font.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body onload="renderGallery()">
    <header class="main-header">
        <div class="div-wrapper">
            <img src="./assets/icons/logo.svg" alt="Fotogram-Logo" class="logo">
        </div>
    </header>

    <main>
        <div class="div-wrapper page-content">
            <h1>Your personal photo album</h1>
            <section id="gallery"></section>
        </div>
    </main>

    <dialog id="photo-overlay" aria-labelledby="photo-title" onclick="closeDialog()">
        <div class="dialog-content" onclick="stopPropagation(event)">
            <header>
                <h2 id="photo-title"></h2>
                <input type="image" aria-label="Dialog schließen" class="close-btn" src="./assets/icons/close.svg" tabindex="0" onclick="closeDialog()">
            </header>
            <section id="photo-container"></section>
            <footer>
                <input type="image" aria-label="vorheriges Foto" class="arrow-btn arrow-left" src="./assets/icons/arrow.svg" tabindex="0" onclick="showPrevImage()">
                <p id="photo-number"></p>
                <input type="image" aria-label="nächstes Foto" class="arrow-btn" src="./assets/icons/arrow.svg" tabindex="0" onclick="showNextImage()">
            </footer>
        </div>
    </dialog>

    <footer class="main-footer">
        <figure class="div-wrapper footer-content">
            <img src="./assets/icons/da-logo.svg" alt="Developer Akademie Logo" class="footer-logo">
            <figcaption class="copyright-text">© 2023 Developer Akademie GmbH</figcaption>
        </figure>
    </footer>
</body>
</html>
